server:
  port: 8080

spring:
  datasource:
    # H2 内存数据库,启动即建库、重启即清空(零配置)
    # MODE=MySQL + IGNORE_CATALOGS_CASE 兼容模式;UNICODE=TRUE 强制按 Unicode 内部存储字符串,解决中文乱码
    url: jdbc:h2:mem:pet_clinic;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;IGNORECASE=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true       # 打开 H2 Web 控制台,调试用
      path: /h2-console
  sql:
    init:
      mode: never        # 不再跑 schema.sql,改用 PetClinicApplication 的 CommandLineRunner 注入(避免 SQL 文件编码问题)
  jpa:
    hibernate:
      ddl-auto: update    # JPA 自动建表 + schema.sql 初始化数据
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # 不再显式指定 dialect,让 Hibernate 自动选 H2

jwt:
  secret: pet-clinic-secret-key-2024
  expiration: 86400000  # 24小时
